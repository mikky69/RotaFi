<!-- Tagline -->
<text x="340" y="314" font-family="system-ui, sans-serif" font-size="13" font-weight="400" text-anchor="middle" letter-spacing="3" style="fill:rgb(156, 154, 146);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">ROTATING SAVINGS · ON-CHAIN</text>
